<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration | Fixed Alignment</title>

<style>
    * { box-sizing: border-box; }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f2f5; /* Normal Solid Color Background */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }

    .form-box {
        width: 100%;
        max-width: 600px;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 { text-align: center; color: #333; margin-bottom: 25px; border-bottom: 2px solid #2b7cff; padding-bottom: 10px; }

    .grid-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    input, select, textarea {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border: 1px solid #ddd;
        border-radius: 8px;
        transition: 0.3s;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #2b7cff;
        box-shadow: 0 0 8px rgba(43, 124, 255, 0.2);
        outline: none;
    }

    .error { color: #d9534f; font-size: 11px; font-weight: bold; margin-top: 2px; height: 15px; }

    .full-width { grid-column: span 2; }

    .group-title { font-weight: bold; margin: 15px 0 8px; color: #444; }

    /* Fix: Options and Tick Box Alignment */
    .options { 
        display: flex; 
        flex-wrap: wrap; 
        gap: 15px; 
        background: #f8f9fa; 
        padding: 12px; 
        border-radius: 8px; 
    }

    .options label {
        display: flex;
        align-items: center; /* Vertical-ah center pannum */
        gap: 8px; /* Box-kum text-kum ulla gap */
        cursor: pointer;
        font-size: 14px;
    }

    input[type="checkbox"], input[type="radio"] {
        width: 16px;
        height: 16px;
        margin: 0; /* Extra margins thookiyachu */
        cursor: pointer;
    }

    button {
        width: 100%;
        padding: 15px;
        background: #2b7cff;
        color: white;
        border: none;
        margin-top: 20px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover { background: #0056b3; }

    @media (max-width: 500px) { .grid-container { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
</style>

</head>
<body>

<div class="form-box">
    <h2>🎓 Student Registration</h2>

    <form onsubmit="return validateForm()">
        <div class="grid-container">
            <div>
                <input type="text" id="name" placeholder="Full Name" onblur="validateName()">
                <div id="nameError" class="error"></div>
            </div>

            <div>
                <input type="text" id="roll" placeholder="Roll Number" onblur="validateRoll()">
                <div id="rollError" class="error"></div>
            </div>

            <div>
                <input type="text" id="email" placeholder="Email Address" onblur="validateEmail()">
                <div id="emailError" class="error"></div>
            </div>

            <div>
                <input type="text" id="phone" placeholder="Phone Number" onblur="validatePhone()">
                <div id="phoneError" class="error"></div>
            </div>

            <div>
                <input type="date" id="dob" onblur="validateDOB()">
                <div id="dobError" class="error"></div>
            </div>

            <div>
                <input type="text" id="cgpa" placeholder="CGPA (0-10)" onblur="validateCGPA()">
                <div id="cgpaError" class="error"></div>
            </div>

            <div>
                <select id="dept" onchange="validateDept()">
                    <option value="">Select Department</option>
                    <option>CSE</option><option>IT</option><option>ECE</option>
                    <option>EEE</option><option>AIML</option><option>Data Science</option>
                </select>
                <div id="deptError" class="error"></div>
            </div>

            <div>
                <select id="year" onchange="validateYear()">
                    <option value="">Select Year</option>
                    <option>1st Year</option><option>2nd Year</option>
                    <option>3rd Year</option><option>4th Year</option>
                </select>
                <div id="yearError" class="error"></div>
            </div>
        </div>

        <div class="group-title">Skills & Languages:</div>
        <div class="options full-width">
            <label><input type="checkbox" name="skill" onclick="validateSkills()"> HTML</label>
            <label><input type="checkbox" name="skill" onclick="validateSkills()"> CSS</label>
            <label><input type="checkbox" name="skill" onclick="validateSkills()"> JS</label>
            <label><input type="checkbox" name="lang" onclick="validateLang()"> Tamil</label>
            <label><input type="checkbox" name="lang" onclick="validateLang()"> English</label>
        </div>
        <div id="skillError" class="error"></div>

        <div class="group-title">Gender:</div>
        <div class="options">
            <label><input type="radio" name="gender" onclick="validateGender()"> Male</label>
            <label><input type="radio" name="gender" onclick="validateGender()"> Female</label>
        </div>
        <div id="genderError" class="error"></div>

        <textarea id="address" placeholder="Residential Address" rows="2" onblur="validateAddress()"></textarea>
        <div id="addressError" class="error"></div>

        <div class="grid-container">
            <div>
                <input type="password" id="password" placeholder="Password" onblur="validatePassword()">
                <div id="passError" class="error"></div>
            </div>
            <div>
                <input type="password" id="confirm" placeholder="Confirm Password" onblur="validateConfirm()">
                <div id="confirmError" class="error"></div>
            </div>
        </div>

        <div style="margin-top: 15px;">
            <label style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="terms" onclick="validateTerms()"> 
                <span style="font-size: 14px;">I agree to the terms and conditions</span>
            </label>
        </div>
        <div id="termsError" class="error"></div>

        <button type="submit">REGISTER NOW</button>
    </form>
</div>

<script>
    function validateName(){ if(name.value.trim()===""){nameError.innerText="Name is required"; return false;} nameError.innerText=""; return true; }
    function validateRoll(){ if(roll.value.trim()===""){rollError.innerText="Roll no required"; return false;} rollError.innerText=""; return true; }
    function validateEmail(){ let p=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/; if(!p.test(email.value)){emailError.innerText="Invalid email"; return false;} emailError.innerText=""; return true; }
    function validatePhone(){ let p=/^[0-9]{10}$/; if(!p.test(phone.value)){phoneError.innerText="10 digits required"; return false;} phoneError.innerText=""; return true; }
    function validateDOB(){ if(dob.value===""){dobError.innerText="Select DOB"; return false;} dobError.innerText=""; return true; }
    function validateDept(){ if(dept.value===""){deptError.innerText="Select dept"; return false;} deptError.innerText=""; return true; }
    function validateYear(){ if(year.value===""){yearError.innerText="Select year"; return false;} yearError.innerText=""; return true; }
    function validateCGPA(){ let x=parseFloat(cgpa.value); if(isNaN(x)||x<0||x>10){cgpaError.innerText="Range 0-10"; return false;} cgpaError.innerText=""; return true; }
    function validateSkills(){ let s=document.getElementsByName("skill"),ok=false; for(let i of s){if(i.checked) ok=true;} if(!ok){skillError.innerText="Select a skill"; return false;} skillError.innerText=""; return true; }
    function validateLang(){ let l=document.getElementsByName("lang"),ok=false; for(let i of l){if(i.checked) ok=true;} if(!ok){skillError.innerText="Select language"; return false;} skillError.innerText=""; return true; }
    function validateGender(){ let g=document.getElementsByName("gender"); if(!g[0].checked&&!g[1].checked){genderError.innerText="Select gender"; return false;} genderError.innerText=""; return true; }
    function validateAddress(){ if(address.value.length<5){addressError.innerText="Address too short"; return false;} addressError.innerText=""; return true; }
    function validatePassword(){ if(password.value.length<6){passError.innerText="Min 6 chars"; return false;} passError.innerText=""; return true; }
    function validateConfirm(){ if(confirm.value!==password.value || confirm.value === ""){confirmError.innerText="Not matching"; return false;} confirmError.innerText=""; return true; }
    function validateTerms(){ if(!terms.checked){termsError.innerText="Please accept"; return false;} termsError.innerText=""; return true; }

    function validateForm(){
        let isV = [validateName(), validateRoll(), validateEmail(), validatePhone(), validateDOB(), validateDept(), validateYear(), validateCGPA(), validateSkills(), validateLang(), validateGender(), validateAddress(), validatePassword(), validateConfirm(), validateTerms()];
        if(isV.includes(false)) return false;
        alert("🎓 Success! Student Registered.");
        return true;
    }
</script>

</body>
</html>
