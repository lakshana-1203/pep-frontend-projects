<!DOCTYPE html>
<html>
<head>
  <title>Month Finder</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      text-align: center;
      padding-top: 100px;
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 220px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #007bff;
      box-shadow: 0 0 5px rgba(0,123,255,0.5);
    }

    button {
      padding: 10px 18px;
      margin-left: 10px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    #result {
      margin-top: 25px;
      font-size: 22px;
      font-weight: bold;
      color: #222;
    }
  </style>

</head>
<body>

<h2>Enter Month Number (0–11)</h2>

<input type="number" id="monthInput" placeholder="Enter 0 to 11">
<button onclick="getMonth()">Submit</button>

<p id="result"></p>

<script>
function getMonth() {
  let month = parseInt(document.getElementById("monthInput").value);
  let monthName;

  switch(month) {
    case 0: monthName = "January"; break;
    case 1: monthName = "February"; break;
    case 2: monthName = "March"; break;
    case 3: monthName = "April"; break;
    case 4: monthName = "May"; break;
    case 5: monthName = "June"; break;
    case 6: monthName = "July"; break;
    case 7: monthName = "August"; break;
    case 8: monthName = "September"; break;
    case 9: monthName = "October"; break;
    case 10: monthName = "November"; break;
    case 11: monthName = "December"; break;
    default: monthName = "Invalid input ❌";
  }

  document.getElementById("result").innerText = monthName;
}
</script>

</body>
</html>
