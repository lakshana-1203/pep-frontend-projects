<!DOCTYPE html>
<html>
<head>
    <title>Modern To-Do List</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 { text-align: center; color: #333; }
        .input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        .add-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .task-item {
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #764ba2;
        }

        .task-text { flex: 1; }
        .edit-btn { background: #ffc107; border: none; padding: 5px 8px; border-radius: 3px; cursor: pointer; }
        .del-btn { background: #dc3545; color: white; border: none; padding: 5px 8px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h2>To-Do List 📝</h2>

        <div class="input-area">
            <input type="text" id="task" placeholder="Enter the task...">
            <button class="add-btn" onclick="addTask()">Add</button>
        </div>

        <div id="tasks"></div>
    </div>

    <script>
        function addTask() {
            var taskInput = document.getElementById("task");
            var taskValue = taskInput.value;

            if (taskValue.trim() === "") {
                alert("Vethu box-ah add panna mudiyathu boss!");
                return;
            }

            var div = document.createElement("div");
            div.className = "task-item";
            
            div.innerHTML = `
                <input type="checkbox">
                <span class="task-text">${taskValue}</span>
                <button class="edit-btn" onclick="editTask(this)">Edit</button>
                <button class="del-btn" onclick="this.parentElement.remove()">Delete</button>
            `;

            document.getElementById("tasks").appendChild(div);
            taskInput.value = ""; 
        }
        function editTask(btn) {
            var span = btn.parentElement.querySelector(".task-text");
            var currentText = span.innerText;
            var newText = prompt("Task-ah mathunga:", currentText);
            
            if (newText !== null && newText.trim() !== "") {
                span.innerText = newText;
            }
        }
    </script>

</body>
</html>
